<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Scientific Calculator</title>  
    <link rel="stylesheet" href="Style.css">
</head>  
<body>  <div class="calculator">  <h2>🧮 Calculator</h2>  

<div class="tabs">  
    <button id="standardBtn" class="active">Standard</button>  
    <button id="scientificBtn">Scientific</button>  
</div>  

<div class="display">  
    <input type="text" id="screen" readonly>  
</div>  

<div id="scientific" class="scientific hidden">  
    <button onclick="append('Math.sin(')">sin</button>  
    <button onclick="append('Math.cos(')">cos</button>  
    <button onclick="append('Math.tan(')">tan</button>  
    <button onclick="append('Math.log10(')">log</button>  

    <button onclick="append('Math.log(')">ln</button>  
    <button onclick="append('3.14159265359')">π</button>  
    <button onclick="append('2.718281828')">e</button>  
    <button onclick="append('Math.sqrt(')">√</button>  

    <button onclick="append('**')">xʸ</button>  
    <button onclick="append('(')">(</button>  
    <button onclick="append(')')">)</button>  
</div>  

<div class="buttons">  
    <button class="clear" onclick="clearDisplay()">C</button>  
    <button onclick="append('/')">÷</button>  
    <button onclick="append('*')">×</button>  
    <button onclick="backspace()">⌫</button>  

    <button onclick="append('7')">7</button>  
    <button onclick="append('8')">8</button>  
    <button onclick="append('9')">9</button>  
    <button onclick="append('-')">−</button>  

    <button onclick="append('4')">4</button>  
    <button onclick="append('5')">5</button>  
    <button onclick="append('6')">6</button>  
    <button onclick="append('+')">+</button>  

    <button onclick="append('1')">1</button>  
    <button onclick="append('2')">2</button>  
    <button onclick="append('3')">3</button>  

    <button class="equal" onclick="calculate()">=</button>  

    <button class="zero" onclick="append('0')">0</button>  
    <button onclick="append('.')">.</button>  
</div>

</div>  <script src="script.js"></script>  </body>  
      </html>
